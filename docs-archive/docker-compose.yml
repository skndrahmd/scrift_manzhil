version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: greensthree-bms
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/ping', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s
    networks:
      - bms-network
    # Optional: Add volume for persistent data if needed
    # volumes:
    #   - ./data:/app/data

  # Optional: Nginx reverse proxy (for SSL and domain)
  nginx:
    image: nginx:alpine
    container_name: greensthree-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - bms-network

networks:
  bms-network:
    driver: bridge
